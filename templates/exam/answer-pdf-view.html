{% load static %}
<!doctype html>
<html lang="fa" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <meta name="remaining-seconds" content="{{ remaining_seconds }}">
    <meta name="exam-id" content="{{ exam.id }}">
    <meta name="csrf-token" content="{{ csrf_token }}">
  <title>سوالات</title>
  <link rel="stylesheet" href="{% static 'css/exam.css'%}" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div class="exam-container">

    <div class="exam-main">
      <!-- راست: نمایش PDF بدون امکان کپی -->
      <div class="pdf-section">
        <div class="pdf-viewer-wrapper">
          <iframe id="pdfFrame" src="{% static 'pdfjs/web/viewer.html' %}?file={{ pdf_url }}" width="100%" height="100%"
            style="border: none;"></iframe>
        </div>
        <div class="pdf-overlay-protection"></div>
      </div>

</body>
</html>
